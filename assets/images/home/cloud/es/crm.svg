<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1642 1094" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1B2533" flood-opacity="0.08"/>
    </filter>
    <clipPath id="bigCardClip"><rect x="180" y="318" width="762" height="664" rx="22"/></clipPath>
  </defs>

  <!-- background -->
  <rect width="1642" height="1094" fill="#EEF1F5"/>

  <!-- LEFT: navy header card -->
  <rect x="180" y="128" width="762" height="152" rx="18" fill="#1B2533"/>
  <text x="222" y="194" font-size="36" font-weight="700" fill="#FFFFFF">Empresa S.A</text>
  <text x="222" y="238" font-size="23" font-weight="400" fill="#9AA6B6">14 Marzo, 2022</text>
  <rect x="818" y="160" width="86" height="86" rx="16" fill="#2C3848"/>
  <path d="M861 188 v40 M861 188 l-15 15 M861 188 l15 15" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- LEFT: big white card -->
  <rect x="180" y="318" width="762" height="664" rx="22" fill="#FFFFFF" filter="url(#cardShadow)"/>
  <g clip-path="url(#bigCardClip)">
    <!-- light-blue action strip -->
    <rect x="180" y="318" width="762" height="190" fill="#EAF1FF"/>
    <!-- 5 icon circles -->
    <g>
      <circle cx="256" cy="413" r="42" fill="#D5E4FF"/>
      <!-- mail -->
      <rect x="234" y="400" width="44" height="30" rx="6" fill="none" stroke="#2F6BFF" stroke-width="4"/>
      <path d="M234 404 l22 16 22-16" fill="none" stroke="#2F6BFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="396" cy="413" r="42" fill="#D5E4FF"/>
      <!-- phone -->
      <path d="M384 398 c0 18 9 27 27 27 l5-9 -11-6 -6 5 c-6-3-9-6-12-12 l5-6 -6-11 z" fill="#2F6BFF"/>
      <circle cx="536" cy="413" r="42" fill="#D5E4FF"/>
      <!-- globe -->
      <circle cx="536" cy="413" r="20" fill="none" stroke="#2F6BFF" stroke-width="4"/>
      <path d="M516 413 h40 M536 393 c12 8 12 32 0 40 c-12-8-12-32 0-40" fill="none" stroke="#2F6BFF" stroke-width="4"/>
      <circle cx="676" cy="413" r="42" fill="#D5E4FF"/>
      <!-- pin -->
      <path d="M676 396 c11 0 18 8 18 18 c0 13-18 25-18 25 c0 0-18-12-18-25 c0-10 7-18 18-18 z" fill="none" stroke="#2F6BFF" stroke-width="4"/>
      <circle cx="676" cy="412" r="6" fill="#2F6BFF"/>
      <!-- arrow primary -->
      <circle cx="836" cy="413" r="44" fill="#2F6BFF"/>
      <path d="M818 413 h36 M838 397 l16 16 -16 16" stroke="#FFFFFF" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- 2x2 mini cards -->
    <g font-size="24" fill="#8A95A5" font-weight="400">
      <rect x="214" y="560" width="320" height="120" rx="14" fill="#F4F6F9"/>
      <text x="246" y="606">Cantidad</text>
      <rect x="246" y="630" width="160" height="14" rx="7" fill="#DDE3EA"/>
      <rect x="588" y="560" width="320" height="120" rx="14" fill="#F4F6F9"/>
      <text x="620" y="606">Probabilidad</text>
      <rect x="620" y="630" width="92" height="14" rx="7" fill="#DDE3EA"/>
      <rect x="214" y="700" width="320" height="120" rx="14" fill="#F4F6F9"/>
      <text x="246" y="746">Asignado a</text>
      <rect x="246" y="770" width="220" height="14" rx="7" fill="#DDE3EA"/>
      <rect x="588" y="700" width="320" height="120" rx="14" fill="#F4F6F9"/>
      <text x="620" y="746">Estimación cierre</text>
      <rect x="620" y="770" width="170" height="14" rx="7" fill="#DDE3EA"/>
    </g>

    <!-- progress chevrons -->
    <g>
      <path d="M214 858 h120 l28 26 -28 26 h-120 l28-26 z" fill="#2F6BFF"/>
      <path d="M348 858 h120 l28 26 -28 26 h-120 l28-26 z" fill="#2F6BFF"/>
      <path d="M482 858 h120 l28 26 -28 26 h-120 l28-26 z" fill="#E3E8EE"/>
      <path d="M616 858 h120 l28 26 -28 26 h-120 l28-26 z" fill="#E3E8EE"/>
      <path d="M750 858 h120 l28 26 -28 26 h-120 l28-26 z" fill="#E3E8EE"/>
    </g>
  </g>

  <!-- RIGHT column cards -->
  <g>
    <rect x="1012" y="128" width="458" height="168" rx="18" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="1052" y="192" font-size="24" fill="#8A95A5">Cantidad</text>
    <text x="1052" y="252" font-size="44" font-weight="700" fill="#1B2533">1,000,000</text>

    <rect x="1012" y="330" width="458" height="168" rx="18" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="1052" y="394" font-size="24" fill="#8A95A5">Asignado a</text>
    <text x="1052" y="454" font-size="40" font-weight="700" fill="#1B2533">Elisa Toro</text>

    <rect x="1012" y="532" width="458" height="190" rx="18" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="1052" y="596" font-size="24" fill="#8A95A5">Estimación cierre</text>
    <text x="1430" y="596" font-size="24" fill="#1B2533" text-anchor="end">21 April</text>
    <rect x="1052" y="630" width="190" height="58" rx="10" fill="#C7EFD8"/>
    <text x="1147" y="668" font-size="26" font-weight="600" fill="#15794A" text-anchor="middle">Ganado</text>
    <rect x="1242" y="630" width="188" height="58" rx="10" fill="#F8D2D2"/>
    <text x="1336" y="668" font-size="26" font-weight="600" fill="#C0392B" text-anchor="middle">Perdido</text>

    <rect x="1012" y="756" width="458" height="168" rx="18" fill="#FFFFFF" filter="url(#cardShadow)"/>
    <text x="1052" y="820" font-size="24" fill="#8A95A5">Probabilidad</text>
    <text x="1052" y="880" font-size="44" font-weight="700" fill="#1B2533">96 %</text>
  </g>
</svg>
